name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run tests
      working-directory: ./mtg
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Display coverage
      working-directory: ./mtg
      run: go tool cover -func=coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build binary
      working-directory: ./mtg
      run: go build -v -o mtg

    - name: Verify binary
      working-directory: ./mtg
      run: ./mtg help
