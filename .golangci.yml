version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # デフォルトで有効なもの（明示的に記載）
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # 追加で有効にするもの
    - misspell
    - gocyclo
    - revive

lintersSettings:
  gocyclo:
    minComplexity: 15
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  excludeUseDefault: false
  maxIssuesPerLinter: 0
  maxSameIssues: 0
